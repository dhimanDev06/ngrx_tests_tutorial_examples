<app-back-to-home></app-back-to-home>

<div class="container p-2 ms-0">
    <div class="row">
        <div class="col-12 col-lg-4">
            <h2>Books</h2>
            <app-book-list class="book-list" [books]="(books$ | async)!"
                (add)="onAdd($event)"></app-book-list>
        </div>
        <div class="col-12 col-lg-4">
            <h2>My Collection</h2>
            <app-book-collection class="book-collection" [books]="(bookCollection$ | async)!"
                (remove)="onRemove($event)"></app-book-collection>
        </div>
        <div class="col-12 col-lg-4">
            <h2>Book Overview</h2>
            <app-post-list class="book-overview"></app-post-list>
        </div>
    </div>
</div>
